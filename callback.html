<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MootsKeeper - Logging in...</title>
</head>
<body>
  <script>
    const API_BASE = "https://streamernetworkfastapi-production.up.railway.app";
    const TOKEN_KEY = "auth_token";
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");

    async function handleCallback() {
      if (!code) {
        window.location.href = "/";
        return;
      }

      const endpoint = state === "google"
        ? `${API_BASE}/auth/google/callback?code=${encodeURIComponent(code)}`
        : `${API_BASE}/auth/callback?code=${encodeURIComponent(code)}`;

      try {
        const res = await fetch(endpoint);
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`OAuth callback failed (${res.status}): ${errText}`);
        }
        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem(TOKEN_KEY, data.access_token);
          localStorage.setItem("auth_provider", state === "google" ? "google" : "twitch");
        }
      } catch (err) {
        console.error(err);
      }

      window.location.href = "/";
    }

    handleCallback();
  </script>
  <p>Logging you in...</p>
</body>
</html>
