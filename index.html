<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/style.css"/>
  <title>MootsKeeper</title>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="layout" style="display:none;">
    <main class="card" style="text-align:center;">
      <h1>MootsKeeper</h1>
      <p>Track your VTuber network. Login with Twitch to get started.</p>
      <button id="login-btn" class="btn-primary" style="margin-top:1rem;">
        Login with Twitch
      </button>
    </main>
  </div>

  <!-- Main App -->
  <div id="app-screen" class="layout" style="display:none;">
    <main class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>MootsKeeper</h1>
        <button id="logout-btn" class="btn-sm">Logout</button>
      </div>

      <div id="Network" class="inner-card">

        <form id="contact-form">

          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="VTuber name..." required>

          <div class="links-block">
            <label>Links</label>
            <div id="links-container"></div>
            <button type="button" id="add-link" aria-label="Add link">+ Add Link</button>
          </div>

          <label for="relationship">Relationship</label>
          <div id="relationship-container"></div>

          <label>Keywords</label>
          <div id="keywords-container"></div>

          <button type="submit" class="btn-primary">Add Contact</button>

        </form>

        <div id="event-holder"></div>

      </div>
    </main>
  </div>

  <script type="module" src="./scripts/CardBuilder.js" defer></script>
</body>
</html>
